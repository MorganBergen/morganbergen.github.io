<!DOCTYPE html>
<html>

<head>
    <title>clock</title>
    <style>
        p {
            @import url(https://fonts.googleapis.com/css?family=Raleway);
            @import url(https://fonts.googleapis.com/css?family=Fira+Mono);
            display: table;
            text-align: center;
            margin: 0 auto;
            padding: 15px;
            color: #fff;
            line-height: 200px;
        }

        h1 {
            @import url(https://fonts.googleapis.com/css?family=Raleway);
            @import url(https://fonts.googleapis.com/css?family=Fira+Mono);
            display: table;
            text-align: center;
            margin: 0 auto;
            font: 15px sans-serif;
            padding: 15px;
            color: grey;
            line-height: 200px;
        }

        #clock {
            display: table;
            align-self: center;
            margin: 0 auto;
            font: 100px sans-serif;
            padding: 15px;
            color: #fff;
            background: linear-gradient(330deg, #fff200 0%, #ff0000 25%, #ff0077 50%, #ff7b00 75%, #ff0000 100%);
            -webkit-text-fill-color: transparent;
            -webkit-background-clip: text;
            line-height: center;
        }
    </style>
</head>

<body>
    <h1>press "D" for dark mode "L" for light</h1>
    <!--we will add a link here-->
    <a href="https://github.com/MorganBergen/morganbergen.github.io/blob/master/README.md">readme</a>
    <script src=" scripts/background.js"></script>
    <span id="clock""></span>
    <script src=" scripts/clock.js"></script>



</body>
